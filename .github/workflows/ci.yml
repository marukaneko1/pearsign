name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      ADMIN_SECRET_KEY: test-key
      CERT_ENCRYPTION_KEY: test-key
      SESSION_SECRET: test-session-secret
      JWT_SECRET: test-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Apply database migrations
        run: psql $DATABASE_URL -f migrations/001_baseline.sql

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Sync Android (verify Capacitor config)
        run: npx cap sync android --no-build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      ADMIN_SECRET_KEY: test-key
      CERT_ENCRYPTION_KEY: test-key
      SESSION_SECRET: test-session-secret
      JWT_SECRET: test-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations
        run: psql $DATABASE_URL -f migrations/001_baseline.sql

      - name: Build app
        run: npm run build

      - name: Start app and run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npx playwright test --reporter=list
        env:
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          TEST_SIGN_TOKEN: ${{ secrets.E2E_TEST_SIGN_TOKEN }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
